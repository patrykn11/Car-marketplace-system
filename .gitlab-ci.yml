stages:
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - mkdir -p .m2/repository
    - cd eitimoto-backend
    - ./mvnw test
  artifacts:
    when: always
    reports:
      junit: eitimoto-backend/target/surefire-reports/TEST-*.xml
